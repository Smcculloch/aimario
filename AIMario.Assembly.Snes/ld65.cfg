## LoROM linker configuration for SNES
## Bank 00-03, 32K each = 128KB ROM

MEMORY {
    # Zero page
    ZP:      start = $00,     size = $100,   type = rw, define = yes;
    # Low RAM (after stack)
    LORAM:   start = $0200,   size = $1E00,  type = rw, define = yes;
    # WRAM for level data
    HIRAM:   start = $2000,   size = $6000,  type = rw, define = yes;

    # ROM banks (LoROM: $8000-$FFFF in each bank)
    ROM0:    start = $008000, size = $8000,  type = ro, file = %O, fill = yes, fillval = $00;
    ROM1:    start = $018000, size = $8000,  type = ro, file = %O, fill = yes, fillval = $00;
    ROM2:    start = $028000, size = $8000,  type = ro, file = %O, fill = yes, fillval = $00;
    ROM3:    start = $038000, size = $8000,  type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    # Zero page variables
    ZEROPAGE:  load = ZP,    type = zp;
    # BSS in low RAM
    BSS:       load = LORAM, type = bss;
    # BSS in high RAM
    HIBSS:     load = HIRAM, type = bss;

    # Code in bank 0
    CODE:      load = ROM0,  type = ro;
    # ROM header + vectors at top of bank 0
    HEADER:    load = ROM0,  type = ro,  start = $00FFC0;
    VECTORS:   load = ROM0,  type = ro,  start = $00FFE0;

    # Read-only data in banks 1-3
    RODATA:    load = ROM1,  type = ro;
    RODATA2:   load = ROM2,  type = ro;
    RODATA3:   load = ROM3,  type = ro;
}
